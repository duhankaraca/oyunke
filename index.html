<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER EVADE - QR EDITION</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #060616; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; 
            color: #fff;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }
        #gameCanvas { 
            display: block; 
            background: #0a0a23;
            box-shadow: 0 0 20px #00fff0;
            margin: 0 auto;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
            color: #00fff0;
            text-shadow: 0 0 10px #00fff0;
            pointer-events: none;
        }
        #instructions {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            color: #ff007f;
            text-shadow: 0 0 5px #ff007f;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui">SKOR: <span id="score">0</span></div>
    <div id="instructions">ZIPLAMAK İÇİN EKRANA DOKUN!</div>
    <canvas id="gameCanvas"></canvas>

<script>
    // ⚠️ BURAYA KENDİ GITHUB PAGES LİNKİNİ YAZMALISIN (Örn: https://duhan.github.io/cyber-evade/)
    const QR_GAME_URL = "YÖNLENDİRİLECEK_GITHUB_PAGES_LİNKİNİZ";

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");

    canvas.width = window.innerWidth > 480 ? 400 : window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    let gameOver = false;
    let gameSpeed = 5;
    let spawnTimeout = null;

    const player = {
        x: 50,
        y: canvas.height - 100,
        size: 30,
        color: "#00fff0",
        gravity: 1.2,
        velocity: 0,
        jumpForce: -18,
        isGrounded: false
    };

    let obstacles = [];

    function spawnObstacle() {
        if (gameOver) return;
        
        let height = Math.random() * 40 + 20;
        obstacles.push({
            x: canvas.width,
            y: canvas.height - height - 50,
            width: 20,
            height: height,
            color: "#ff007f"
        });
        
        spawnTimeout = setTimeout(spawnObstacle, Math.random() * 1500 + 1000);
    }

    function doJump() {
        if (gameOver) {
            // Eğer oyun bittiyse ve ekrana dokunulursa sayfayı yenileyerek QR mantığına sadık kalır
            window.location.href = QR_GAME_URL !== "YÖNLENDİRİLECEK_GITHUB_PAGES_LİNKİNİZ" ? QR_GAME_URL : window.location.href;
            return;
        }
        if (player.isGrounded) {
            player.velocity = player.jumpForce;
            player.isGrounded = false;
        }
    }

    window.addEventListener("touchstart", (e) => { e.preventDefault(); doJump(); }, { passive: false });
    window.addEventListener("mousedown", doJump);

    function animate() {
        if (gameOver) {
            ctx.fillStyle = "rgba(0,0,0,0.85)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#ff007f";
            ctx.font = "30px Impact";
            ctx.textAlign = "center";
            ctx.fillText("OYUN BİTTİ", canvas.width / 2, canvas.height / 2 - 20);
            
            ctx.font = "18px Courier New";
            ctx.fillStyle = "#00fff0";
            ctx.fillText("Yeniden Başlatmak İçin", canvas.width / 2, canvas.height / 2 + 30);
            ctx.fillText("Ekrana Dokun!", canvas.width / 2, canvas.height / 2 + 60);
            return;
        }

        requestAnimationFrame(animate);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Yol
        ctx.strokeStyle = "#444";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(0, canvas.height - 50);
        ctx.lineTo(canvas.width, canvas.height - 50);
        ctx.stroke();

        // Fizik
        player.velocity += player.gravity;
        player.y += player.velocity;

        if (player.y >= canvas.height - 50 - player.size) {
            player.y = canvas.height - 50 - player.size;
            player.velocity = 0;
            player.isGrounded = true;
        }

        // Oyuncu
        ctx.fillStyle = player.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = player.color;
        ctx.fillRect(player.x, player.y, player.size, player.size);

        // Engeller
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.x -= gameSpeed;

            ctx.fillStyle = o.color;
            ctx.shadowColor = o.color;
            ctx.fillRect(o.x, o.y, o.width, o.height);

            if (
                player.x < o.x + o.width &&
                player.x + player.size > o.x &&
                player.y < o.y + o.height &&
                player.y + player.size > o.y
            ) {
                gameOver = true;
            }

            if (o.x + o.width < 0) {
                obstacles.splice(i, 1);
                score++;
                scoreEl.innerText = score;
                if (score % 5 === 0) gameSpeed += 0.6; // Hızlanma çarpanı biraz artırıldı (QR arcade hissiyatı)
            }
        }
        ctx.shadowBlur = 0;
    }

    spawnObstacle();
    animate();
</script>
</body>
</html>
